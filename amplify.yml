version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm run build --prefix packages/contracts
    build:
      commands:
        - printenv | grep NEXT_PUBLIC_ >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*

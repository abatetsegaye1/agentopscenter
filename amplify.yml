version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npm run build --prefix packages/contracts
    build:
      commands:
        - env | grep -e NEXT_PUBLIC_ >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
